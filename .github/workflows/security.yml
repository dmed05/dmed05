name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "53 9 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash scripts/security-check.sh
      - uses: gitleaks/gitleaks-action@v2
